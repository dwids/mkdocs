site_name: DS Tech Blog - mkdocs test
theme:
  name: material
  
plugins:
  - search
  - tags:
      tags_file: tags.md

markdown_extensions:
#  - pymdownx.blocks.quotes  # Supports Obsidian > [!info] syntax
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - nl2br
  - callouts
  
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js